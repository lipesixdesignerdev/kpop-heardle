<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Pop Girl Group Heardle 🎵</title>
<style>
:root{--pink:#ff4da6;--purple:#9b5de5;--dark:#0d0d1a;--card:#1a1a2e;--card2:#16213e;--text:#f0e6ff;--muted:#8888aa;--green:#4dffb4;--yellow:#ffd166;--red:#ff6b6b;--border:#2a2a4a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
header{text-align:center;margin-bottom:20px}
h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--muted);font-size:.9rem;margin-top:4px}
.stats{display:flex;gap:20px;justify-content:center;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 24px}
.stat{text-align:center}.sv{font-size:1.3rem;font-weight:800;color:var(--pink)}.sl{color:var(--muted);font-size:.75rem}
.gc{width:100%;max-width:600px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.pt{font-weight:700;color:var(--pink)}.ac{color:var(--muted);font-size:.85rem}
.wv{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pb{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;cursor:pointer;font-size:1.4rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;transition:transform .1s}
.pb:hover{transform:scale(1.05)}.pb:active{transform:scale(.95)}
.pw{flex:1;background:var(--border);border-radius:8px;height:8px}
.pf{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--pink),var(--purple));width:0%;transition:width .15s}
.tl{color:var(--muted);font-size:.8rem;min-width:36px;text-align:right}
.cr{display:flex;gap:4px}.cs{flex:1;height:6px;border-radius:3px;background:var(--border)}.cs.u{background:var(--purple)}.cs.a{background:var(--pink)}
.gt{font-weight:700;margin-bottom:10px;color:var(--muted);font-size:.8rem;text-transform:uppercase;letter-spacing:1px}
.gs{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:10px;margin-bottom:5px;border:1px solid var(--border);background:var(--card2);min-height:42px;font-size:.88rem}
.gs.ok{border-color:var(--green);background:rgba(77,255,180,.08);color:var(--green)}
.gs.no{border-color:var(--red);background:rgba(255,107,107,.08);color:var(--red);text-decoration:line-through;opacity:.7}
.gs.sk{border-color:var(--yellow);background:rgba(255,209,102,.08);color:var(--yellow);font-style:italic}
.sw{position:relative}
.si{width:100%;padding:11px 15px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.93rem;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--pink)}.si::placeholder{color:var(--muted)}
.au{position:absolute;top:100%;left:0;right:0;z-index:10;background:var(--card2);border:1px solid var(--border);border-radius:10px;max-height:190px;overflow-y:auto;margin-top:3px;display:none}
.au.open{display:block}
.ai{padding:9px 15px;cursor:pointer;font-size:.88rem;border-bottom:1px solid var(--border)}.ai:last-child{border-bottom:none}.ai:hover{background:var(--border)}.ai .aa{font-size:.74rem;color:var(--pink)}
.br{display:flex;gap:10px;margin-top:11px}
.btn{flex:1;padding:11px;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s}
.bsk{background:var(--card2);border:1px solid var(--border);color:var(--muted)}.bsk:hover{border-color:var(--yellow);color:var(--yellow)}
.bgu{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff}.bgu:hover{opacity:.9}.bgu:disabled{opacity:.4;cursor:not-allowed}
.rc{text-align:center;display:none}.rc.show{display:block}
.re{font-size:3rem;margin-bottom:10px}.rt{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.rs{color:var(--pink);font-size:1.05rem;font-weight:700}.ra{color:var(--muted);font-size:.88rem;margin-bottom:14px}
.sh{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-family:monospace;font-size:.83rem;margin-bottom:10px;text-align:left;line-height:1.7;white-space:pre-wrap}
.bn{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:10px;padding:11px;font-size:.95rem;font-weight:700;cursor:pointer;display:block;width:100%;margin-top:8px;transition:all .15s}
.bn:hover{opacity:.9}.bn.sec{background:var(--card2);border:1px solid var(--border);color:var(--text)}
.yt-wrap{position:fixed;bottom:-9999px;left:-9999px;width:480px;height:270px;pointer-events:none;opacity:0}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:10px;font-size:.88rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<header>
  <h1>🎵 K-Pop Girl Group Heardle</h1>
  <p>Adivinhe a música — ilimitado, sem espera!</p>
</header>
<div class="stats">
  <div class="stat"><div class="sv" id="sp">0</div><div class="sl">Jogadas</div></div>
  <div class="stat"><div class="sv" id="sw">0</div><div class="sl">Vitórias</div></div>
  <div class="stat"><div class="sv" id="ss">0</div><div class="sl">Sequência</div></div>
  <div class="stat"><div class="sv" id="sb">-</div><div class="sl">Melhor</div></div>
</div>
<div class="gc">
  <div class="card">
    <div class="ph"><span class="pt">🎧 Ouça o trecho</span><span class="ac" id="ac">Tentativa 1/6</span></div>
    <div class="wv">
      <button class="pb" id="pb" onclick="togglePlay()">▶</button>
      <div class="pw"><div class="pf" id="pf"></div></div>
      <span class="tl" id="tl">0:01</span>
    </div>
    <div class="cr" id="cr"></div>
  </div>
  <div class="card"><div class="gt">Tentativas</div><div id="gl"></div></div>
  <div class="card" id="ic">
    <div class="sw">
      <input class="si" id="si" placeholder="🔍 Nome da música ou artista..." autocomplete="off" oninput="onSrch()" onkeydown="onKey(event)"/>
      <div class="au" id="au"></div>
    </div>
    <div class="br">
      <button class="btn bsk" onclick="doSkip()">⏭ Pular</button>
      <button class="btn bgu" id="gb" onclick="doGuess()" disabled>✓ Confirmar</button>
    </div>
  </div>
  <div class="card rc" id="rc">
    <div class="re" id="re"></div>
    <div class="rt" id="rt"></div>
    <div class="rs" id="rs"></div>
    <div class="ra" id="ra"></div>
    <div class="sh" id="sh"></div>
    <button class="bn" onclick="cpShare()">📋 Copiar resultado</button>
    <button class="bn sec" onclick="nextR()">▶ Próxima música</button>
  </div>
</div>

<!-- YouTube iframe fica escondido aqui -->
<div class="yt-wrap">
  <iframe id="ytf" width="480" height="270" frameborder="0" allowfullscreen
    allow="autoplay; encrypted-media"></iframe>
</div>

<script>
const SONGS=[
  {title:"DDU-DU DDU-DU",artist:"BLACKPINK",yt:"IHNzOHi8sJs"},
  {title:"Kill This Love",artist:"BLACKPINK",yt:"2S24-y0Ij3Y"},
  {title:"How You Like That",artist:"BLACKPINK",yt:"ioNng23DkIM"},
  {title:"Lovesick Girls",artist:"BLACKPINK",yt:"uTRcNWAGBHs"},
  {title:"Pink Venom",artist:"BLACKPINK",yt:"tyZAaWFHs1Y"},
  {title:"Shut Down",artist:"BLACKPINK",yt:"P9GWXEBH4MQ"},
  {title:"BOOMBAYAH",artist:"BLACKPINK",yt:"bwmSjveL3Lc"},
  {title:"As If It's Your Last",artist:"BLACKPINK",yt:"Amq-qlqbjYA"},
  {title:"TT",artist:"TWICE",yt:"yjMZyiEMQCs"},
  {title:"Feel Special",artist:"TWICE",yt:"4v1cH2FMJAM"},
  {title:"CHEER UP",artist:"TWICE",yt:"c7rCAmNy-rc"},
  {title:"What is Love?",artist:"TWICE",yt:"tv5EVVMxVXk"},
  {title:"Fancy",artist:"TWICE",yt:"kOHB85vDuow"},
  {title:"YES or YES",artist:"TWICE",yt:"oYuqHxFfAog"},
  {title:"The Feels",artist:"TWICE",yt:"N2MeFMQNFBQ"},
  {title:"Black Mamba",artist:"aespa",yt:"XmDTEpVwlBw"},
  {title:"Next Level",artist:"aespa",yt:"4TWR90KJl84"},
  {title:"Savage",artist:"aespa",yt:"WPdWvnAAurg"},
  {title:"Girls",artist:"aespa",yt:"b5RRaXXHJhc"},
  {title:"Spicy",artist:"aespa",yt:"2Q9VD8SFMJ0"},
  {title:"DALLA DALLA",artist:"ITZY",yt:"ggBDdOBbEWk"},
  {title:"ICY",artist:"ITZY",yt:"GE8GzmUkVWE"},
  {title:"WANNABE",artist:"ITZY",yt:"SWMDnkjkPGU"},
  {title:"Not Shy",artist:"ITZY",yt:"9TiXEQNPrOM"},
  {title:"Loco",artist:"ITZY",yt:"Cf0DKrM0YYg"},
  {title:"Hype Boy",artist:"NewJeans",yt:"H_nOEH9WJHM"},
  {title:"Attention",artist:"NewJeans",yt:"g7QLCm_XtHo"},
  {title:"Ditto",artist:"NewJeans",yt:"pSUydWEqKwE"},
  {title:"OMG",artist:"NewJeans",yt:"bvbc_lsYZsE"},
  {title:"Super Shy",artist:"NewJeans",yt:"ArmDp-zijuc"},
  {title:"ETA",artist:"NewJeans",yt:"7EBYpASMB9M"},
  {title:"ELEVEN",artist:"IVE",yt:"fNwBFBtGOQ0"},
  {title:"LOVE DIVE",artist:"IVE",yt:"7md7PWDM2EI"},
  {title:"After LIKE",artist:"IVE",yt:"F0B7HDiY-10"},
  {title:"I AM",artist:"IVE",yt:"KJt6gXjOHJU"},
  {title:"FEARLESS",artist:"LE SSERAFIM",yt:"nyqgxt23wl4"},
  {title:"ANTIFRAGILE",artist:"LE SSERAFIM",yt:"Gqz7Mn7WA3Y"},
  {title:"UNFORGIVEN",artist:"LE SSERAFIM",yt:"d4Aa-BKvnFE"},
  {title:"Psycho",artist:"Red Velvet",yt:"uR8Mrt1IpXg"},
  {title:"Bad Boy",artist:"Red Velvet",yt:"J_CFBjAyPWE"},
  {title:"Red Flavor",artist:"Red Velvet",yt:"WyiIGEHQP8o"},
  {title:"Feel My Rhythm",artist:"Red Velvet",yt:"R9At2ICm4LQ"},
  {title:"TOMBOY",artist:"(G)I-DLE",yt:"G6pPZD8Nn-A"},
  {title:"Queencard",artist:"(G)I-DLE",yt:"1FBV1HBFBHQ"},
  {title:"Nxde",artist:"(G)I-DLE",yt:"eI-ohMPBRG8"},
  {title:"Oh My God",artist:"(G)I-DLE",yt:"t8aDPHAArGQ"},
  {title:"HIP",artist:"MAMAMOO",yt:"Rj7dvPkzpVQ"},
  {title:"Gogobebe",artist:"MAMAMOO",yt:"YFe7YjEKEFM"},
  {title:"UP&DOWN",artist:"EXID",yt:"R_GhMeEPPFI"},
  {title:"WA DA DA",artist:"Kep1er",yt:"YUPwHCGNJGk"},
  {title:"O.O",artist:"NMIXX",yt:"mGEsX5qLF7I"},
  {title:"DICE",artist:"NMIXX",yt:"LJCq_oKjsHk"},
  {title:"Rollin'",artist:"Brave Girls",yt:"A8LHRD3JRUU"},
  {title:"Scream",artist:"Dreamcatcher",yt:"6zuhSWEL77A"},
  {title:"I AM THE BEST",artist:"2NE1",yt:"j7_lSP8xyXY"},
  {title:"Crazy",artist:"4Minute",yt:"BPKF8iHxiHA"},
  {title:"Roly Poly",artist:"T-ARA",yt:"5MfexMFF1GU"},
  {title:"Mister",artist:"KARA",yt:"7mJ7GAsHkWI"},
  {title:"Alone",artist:"SISTAR",yt:"k1qxRPLrA0E"},
  {title:"Shake It",artist:"SISTAR",yt:"3CZ5ixUGSBc"},
  {title:"Bad Girl Good Girl",artist:"miss A",yt:"awRiMeudIyA"},
  {title:"4 Walls",artist:"f(x)",yt:"ooBLpKT1jwQ"},
  {title:"Mr. Chu",artist:"Apink",yt:"yC7jdUbHpR4"},
  {title:"Something",artist:"Girl's Day",yt:"pfCq1RkZeUY"},
];

const CLIPS=[1,2,4,7,11,16];
let song,att=0,guesses=[],over=false,used=[],sel=null,af=null,isEnd=false,ready=false,startTime=null,pausedAt=0,playing=false;
let stats=JSON.parse(localStorage.getItem('kgg2')||'{"played":0,"wins":0,"streak":0,"best":0}');

// YouTube IFrame API
window.onYouTubeIframeAPIReady=()=>{ ready=true; };
const sc=document.createElement('script');sc.src='https://www.youtube.com/iframe_api';document.head.appendChild(sc);

let ytPlayer=null;
function loadYT(videoId){
  const container=document.getElementById('ytf').parentElement;
  container.innerHTML=`<div id="ytplayer"></div>`;
  ytPlayer=new YT.Player('ytplayer',{
    width:480,height:270,videoId:videoId,
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,rel:0,modestbranding:1},
    events:{
      onReady:()=>{ ready=true; },
      onStateChange:(e)=>{
        if(e.data===YT.PlayerState.PLAYING){ playing=true; document.getElementById('pb').textContent='⏸'; doTick(); }
        else{ playing=false; document.getElementById('pb').textContent='▶'; }
      }
    }
  });
}

function doTick(){
  if(af)cancelAnimationFrame(af);
  const go=()=>{
    if(!ytPlayer||!ytPlayer.getCurrentTime)return;
    const ct=ytPlayer.getCurrentTime();
    const mx=isEnd?(ytPlayer.getDuration()||240):CLIPS[att];
    if(!isEnd&&ct>=mx){
      ytPlayer.pauseVideo();ytPlayer.seekTo(0,true);
      document.getElementById('pf').style.width='100%';
      document.getElementById('tl').textContent=fmt(mx);
      playing=false;document.getElementById('pb').textContent='▶';return;
    }
    document.getElementById('pf').style.width=Math.min(ct/mx*100,100)+'%';
    document.getElementById('tl').textContent=fmt(ct);
    af=requestAnimationFrame(go);
  };af=requestAnimationFrame(go);
}

function fmt(s){return'0:'+String(Math.floor(s)).padStart(2,'0');}
function saveS(){localStorage.setItem('kgg2',JSON.stringify(stats));}
function updS(){document.getElementById('sp').textContent=stats.played;document.getElementById('sw').textContent=stats.wins;document.getElementById('ss').textContent=stats.streak;document.getElementById('sb').textContent=stats.best||'-';}

function pickSong(){
  const av=SONGS.map((_,i)=>i).filter(i=>!used.includes(i));
  if(!av.length){used=[];return pickSong();}
  const i=av[Math.floor(Math.random()*av.length)];used.push(i);return{...SONGS[i]};
}

function init(){
  att=0;guesses=[];over=false;sel=null;isEnd=false;playing=false;
  if(af){cancelAnimationFrame(af);af=null;}
  song=pickSong();
  document.getElementById('si').value='';document.getElementById('si').disabled=false;
  document.getElementById('gb').disabled=true;document.getElementById('au').classList.remove('open');
  document.getElementById('rc').classList.remove('show');document.getElementById('ic').style.display='';
  document.getElementById('pf').style.width='0%';document.getElementById('tl').textContent=fmt(CLIPS[0]);
  document.getElementById('pb').textContent='▶';
  rGuesses();rClips();rAtt();updS();
  // Load player
  if(typeof YT!=='undefined'&&YT.Player)loadYT(song.yt);
  else{const chk=setInterval(()=>{if(typeof YT!=='undefined'&&YT.Player){clearInterval(chk);loadYT(song.yt);}},200);}
}

function rGuesses(){
  const l=document.getElementById('gl');l.innerHTML='';
  for(let i=0;i<6;i++){
    const d=document.createElement('div');d.className='gs';
    if(i<guesses.length){const g=guesses[i];
      if(g.skip){d.classList.add('sk');d.innerHTML='<span>⏭</span><span>Pulado</span>';}
      else if(g.ok){d.classList.add('ok');d.innerHTML=`<span>✓</span><span>${g.t}</span>`;}
      else{d.classList.add('no');d.innerHTML=`<span>✗</span><span>${g.t}</span>`;}
    }else if(i===guesses.length&&!over){d.style.borderColor='var(--pink)';d.innerHTML='<span style="color:var(--muted)">Sua resposta...</span>';}
    else d.innerHTML='<span style="color:var(--border)">—</span>';
    l.appendChild(d);
  }
}
function rClips(){
  const r=document.getElementById('cr');r.innerHTML='';
  for(let i=0;i<6;i++){const d=document.createElement('div');d.className='cs'+(i<att?' u':'')+(i===att&&!over?' a':'');r.appendChild(d);}
}
function rAtt(){document.getElementById('ac').textContent=`Tentativa ${Math.min(att+1,6)}/6`;}

function togglePlay(){
  if(!ytPlayer||!ytPlayer.getPlayerState){toast('⏳ Carregando player...');return;}
  const st=ytPlayer.getPlayerState();
  if(st===YT.PlayerState.PLAYING){ytPlayer.pauseVideo();}
  else{ytPlayer.seekTo(0,true);ytPlayer.playVideo();}
}

function rstP(){
  if(ytPlayer&&ytPlayer.pauseVideo){ytPlayer.pauseVideo();ytPlayer.seekTo(0,true);}
  document.getElementById('pf').style.width='0%';playing=false;document.getElementById('pb').textContent='▶';
}

function onSrch(){
  const v=document.getElementById('si').value.trim().toLowerCase();
  sel=null;document.getElementById('gb').disabled=true;
  if(!v){document.getElementById('au').classList.remove('open');return;}
  const m=SONGS.filter(s=>s.title.toLowerCase().includes(v)||s.artist.toLowerCase().includes(v)).slice(0,8);
  const au=document.getElementById('au');
  if(!m.length){au.classList.remove('open');return;}
  au.innerHTML='';
  m.forEach(s=>{const d=document.createElement('div');d.className='ai';d.innerHTML=`<div>${s.title}</div><div class="aa">${s.artist}</div>`;d.onclick=()=>selSong(s);au.appendChild(d);});
  au.classList.add('open');
}
function selSong(s){sel=s;document.getElementById('si').value=`${s.title} — ${s.artist}`;document.getElementById('au').classList.remove('open');document.getElementById('gb').disabled=false;}
function onKey(e){if(e.key==='Enter'&&sel)doGuess();if(e.key==='Escape')document.getElementById('au').classList.remove('open');}

function doSkip(){
  if(over)return;guesses.push({skip:true});att++;rstP();
  if(att>=6){endGame(false);return;}
  rGuesses();rClips();rAtt();
  document.getElementById('si').value='';sel=null;document.getElementById('gb').disabled=true;
  document.getElementById('tl').textContent=fmt(CLIPS[att]);
}
function doGuess(){
  if(!sel||over)return;
  const ok=sel.title.toLowerCase()===song.title.toLowerCase()&&sel.artist.toLowerCase()===song.artist.toLowerCase();
  guesses.push({t:`${sel.title} — ${sel.artist}`,ok,skip:false});att++;
  document.getElementById('si').value='';sel=null;document.getElementById('gb').disabled=true;
  document.getElementById('au').classList.remove('open');rstP();
  if(ok){rGuesses();endGame(true);}
  else if(att>=6){rGuesses();endGame(false);}
  else{rGuesses();rClips();rAtt();toast('❌ Errou! Mais um trecho...');document.getElementById('tl').textContent=fmt(CLIPS[att]);}
}

function endGame(won){
  over=true;isEnd=true;rClips();
  stats.played++;
  if(won){stats.wins++;stats.streak++;if(!stats.best||att<stats.best)stats.best=att;}else stats.streak=0;
  saveS();updS();
  const ic=guesses.map(g=>g.ok?'🟩':g.skip?'⬛':'🟥');
  for(let i=guesses.length;i<6;i++)ic.push('⬜');
  const sh=`🎵 K-Pop Girl Group Heardle\n${song.title} — ${song.artist}\n${ic.join('')}`;
  document.getElementById('re').textContent=won?'🎉':'😢';
  document.getElementById('rt').textContent=won?`Acertou em ${guesses.filter(g=>!g.skip).length} tentativa(s)!`:'Não foi dessa vez!';
  document.getElementById('rs').textContent=song.title;
  document.getElementById('ra').textContent=song.artist;
  document.getElementById('sh').textContent=sh;
  document.getElementById('ic').style.display='none';
  document.getElementById('rc').classList.add('show');
  if(ytPlayer&&ytPlayer.seekTo){ytPlayer.seekTo(0,true);ytPlayer.playVideo();doTick();}
}
function cpShare(){navigator.clipboard.writeText(document.getElementById('sh').textContent).then(()=>toast('📋 Copiado!')).catch(()=>toast('Selecione e copie manualmente'));}
function nextR(){if(ytPlayer){try{ytPlayer.pauseVideo();}catch(e){}}if(af){cancelAnimationFrame(af);af=null;}init();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
document.addEventListener('click',e=>{if(!e.target.closest('.sw'))document.getElementById('au').classList.remove('open');});
updS();init();
</script>
</body>
</html>
